# Provider Configuration Templates - Model-Agnostic v3.1.4
# Five-tier provider allocation based on complexity, importance, and context requirements
# Each provider uses its optimal default model automatically

model_templates:

  # Tier S: Supreme Executive (Maximum Strategic Context)
  # CEO, CTO - Ultimate decision makers requiring maximum strategic context
  tier_supreme_executive:
    primary:
      provider: claude-code
      temperature: 0.25
      max_tokens: 20480  # 20K tokens - Maximum strategic context
    fallback:
      provider: gemini-cli
      temperature: 0.3
      max_tokens: 16384  # 16K tokens

  # Tier A: Advanced Strategic (High Strategic Context)
  # CFO, Legal, Architect - Complex strategic and governance roles
  tier_advanced_strategic:
    primary:
      provider: gemini-cli
      temperature: 0.3
      max_tokens: 14336  # 14K tokens
    fallback:
      provider: claude-code
      temperature: 0.35
      max_tokens: 12288  # 12K tokens

  # Tier B: Core Technical (High Technical Context)
  # Backend, Algorithm, Security, Data, Quantum - Core technical complexity
  tier_core_technical:
    primary:
      provider: claude-code
      temperature: 0.2
      max_tokens: 12288  # 12K tokens
    fallback:
      provider: openai-cli
      temperature: 0.25
      max_tokens: 10240  # 10K tokens

  # Tier C: Professional Implementation (Medium-High Context)
  # Frontend, DevOps, Quality, Network, Edge - Professional implementation roles
  tier_professional_implementation:
    primary:
      provider: openai-cli
      model: gpt-5-codex
      temperature: 0.3
      max_tokens: 9216   # 9K tokens
    fallback:
      provider: gemini-cli
      model: gemini-2.5-pro
      temperature: 0.35
      max_tokens: 7168   # 7K tokens

  # Tier D: Creative Communication (Medium Context)
  # Design, Product, Docs, Marketer - Creative and communication roles
  tier_creative_communication:
    primary:
      provider: gemini-cli
      model: gemini-2.5-pro
      temperature: 0.4
      max_tokens: 7168   # 7K tokens
    fallback:
      provider: claude-code
      model: opus
      temperature: 0.5
      max_tokens: 5632   # 5.5K tokens

  # Legacy templates (maintained for backward compatibility)
  # Updated with latest models but reduced priority
  simple:
    primary:
      provider: claude-code
      model: opus
      temperature: 0.3
      max_tokens: 4096
    fallback:
      provider: gemini-cli
      model: gemini-2.5-pro
      temperature: 0.4
      max_tokens: 3072

  complex:
    primary:
      provider: claude-code
      model: opus
      temperature: 0.2
      max_tokens: 8192
    fallback:
      provider: openai-cli
      model: gpt-5-codex
      temperature: 0.3
      max_tokens: 6144

  precision:
    primary:
      provider: claude-code
      model: opus
      temperature: 0.1
      max_tokens: 4096
    fallback:
      provider: openai-cli
      model: gpt-5-codex
      temperature: 0.2
      max_tokens: 3072

  creative:
    primary:
      provider: gemini-cli
      model: gemini-2.5-pro
      temperature: 0.5
      max_tokens: 4096
    fallback:
      provider: claude-code
      model: opus
      temperature: 0.6
      max_tokens: 3072

  large_context:
    primary:
      provider: claude-code
      model: opus
      temperature: 0.2
      max_tokens: 16384
    fallback:
      provider: gemini-cli
      model: gemini-2.5-pro
      temperature: 0.3
      max_tokens: 12288

